<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <!-- Trellis Horizontal Logo (light mode) — Mark + Wordmark -->

  <!-- === MARK (scaled to fit 60x60 area, offset 10,10) === -->
  <g transform="translate(8, 8) scale(0.5)">
    <!-- Diamond lattice -->
    <g stroke="#7c3aed" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="24" y1="20" x2="96" y2="92"/>
      <line x1="24" y1="52" x2="80" y2="108"/>
      <line x1="40" y1="12" x2="104" y2="76"/>
      <line x1="96" y1="20" x2="24" y2="92"/>
      <line x1="96" y1="52" x2="40" y2="108"/>
      <line x1="80" y1="12" x2="16" y2="76"/>
    </g>
    <!-- Nodes -->
    <g fill="#7c3aed" opacity="0.45">
      <circle cx="60" cy="36" r="3"/>
      <circle cx="40" cy="56" r="3"/>
      <circle cx="80" cy="56" r="3"/>
      <circle cx="60" cy="76" r="3"/>
      <circle cx="44" cy="92" r="3"/>
      <circle cx="76" cy="92" r="3"/>
    </g>
    <!-- Vine -->
    <path d="M 38,105 C 42,88 48,80 54,68 S 64,50 70,42 S 80,28 84,18"
      fill="none" stroke="#2dd4bf" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Leaves -->
    <g fill="#2dd4bf" opacity="0.85">
      <path d="M 54,68 C 42,60 37,50 46,48 C 55,46 56,58 54,68 Z"/>
      <path d="M 72,40 C 82,34 90,30 88,38 C 86,46 78,44 72,40 Z"/>
    </g>
    <circle cx="60" cy="56" r="4" fill="#2dd4bf"/>
  </g>

  <!-- === WORDMARK === -->
  <text
    x="78" y="52"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#1e1b4b"
  >Trellis</text>

  <!-- Subtle tagline -->
  <text
    x="79" y="68"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="2"
    fill="#64748b"
  >DOCS FRAMEWORK</text>
</svg>
